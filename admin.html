<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultra Admin | Haider Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        
        :root { 
            --primary: #005f6b; --bg: #f1f5f9; --white: #ffffff; 
            --text: #1e293b; --border: #cbd5e1; --red: #ef4444; --green: #22c55e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); }

        /* Header */
        .brand-header {
            background: #000; color: white; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; font-family: 'Orbitron';
        }

        /* Layout */
        .admin-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px; padding: 20px; max-width: 1400px; margin: auto;
        }

        .card {
            background: var(--white); border-radius: 15px; padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid var(--border);
        }

        h3 { 
            font-family: 'Orbitron'; font-size: 13px; margin-bottom: 20px; 
            color: var(--primary); display: flex; align-items: center; gap: 10px;
            border-bottom: 2px solid #f1f5f9; padding-bottom: 10px;
        }

        /* Inputs */
        label { font-size: 11px; font-weight: 700; color: #64748b; margin-top: 10px; display: block; }
        input, select, textarea {
            width: 100%; padding: 12px; margin-top: 5px; border: 1px solid var(--border);
            border-radius: 8px; font-size: 14px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,95,107,0.1); }

        .btn-sync {
            width: 100%; padding: 15px; background: var(--primary); color: white;
            border: none; border-radius: 10px; font-weight: 700; cursor: pointer;
            font-family: 'Orbitron'; margin-top: 15px; transition: 0.3s;
        }
        .btn-sync:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-green { background: var(--green); }

        /* Image Upload Box */
        .upload-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 10px 0; }
        .up-box {
            border: 2px dashed var(--border); border-radius: 10px; padding: 10px;
            text-align: center; cursor: pointer; font-size: 10px; background: #f8fafc;
        }
        .up-box i { display: block; font-size: 20px; color: var(--primary); margin-bottom: 5px; }

        /* Inventory List */
        .inv-item {
            display: flex; align-items: center; gap: 15px; padding: 10px;
            border-bottom: 1px solid #f1f5f9; position: relative;
        }
        .inv-item img { width: 50px; height: 50px; object-fit: contain; border-radius: 5px; }
        .inv-info h4 { font-size: 13px; }
        .inv-info p { font-size: 11px; color: #64748b; }
        .del-btn { color: var(--red); cursor: pointer; position: absolute; right: 10px; }

        #loginOverlay { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        #toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 12px 25px; border-radius: 8px; display: none; z-index: 10001; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div style="text-align: center; width: 300px;">
        <h2 style="font-family:'Orbitron'; margin-bottom:20px;">ACCESS DENIED</h2>
        <input type="email" id="emailIn" placeholder="Admin Email">
        <input type="password" id="passIn" placeholder="Password">
        <button onclick="login()" class="btn-sync">UNLOCk SYSTEM</button>
    </div>
</div>

<div class="brand-header">
    <div>HAIDER STORE <span style="color:var(--red)">ULTRA</span></div>
    <button onclick="logout()" style="background:none; border:none; color:white; cursor:pointer;"><i class="fa fa-sign-out-alt"></i></button>
</div>

<div class="admin-container" id="adminPanel" style="display:none;">
    
    <div class="card">
        <h3><i class="fa fa-palette"></i> Design & Branding</h3>
        <label>Store Name</label>
        <input type="text" id="sName" placeholder="Haider Store">
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div><label>Header Color</label><input type="color" id="hColor"></div>
            <div><label>Footer Color</label><input type="color" id="fColor"></div>
        </div>

        <label>Accent Color (Buttons)</label>
        <input type="color" id="aColor">

        <label>Product Grid Layout</label>
        <select id="sGrid">
            <option value="2">2 Columns (Standard)</option>
            <option value="1">1 Column (Large)</option>
            <option value="3">3 Columns (Small)</option>
        </select>
        
        <button onclick="saveWebSettings()" class="btn-sync btn-green">APPLY TO WEBSITE</button>
    </div>

    <div class="card">
        <h3><i class="fa fa-home"></i> Home Page Content</h3>
        <label>Main Banner Image URL</label>
        <input type="text" id="bUrl" placeholder="Paste ImgBB link here">
        
        <label>Hero Heading Text</label>
        <input type="text" id="hText" placeholder="e.g. New Year Sale!">
        
        <label>Announcement Bar Text</label>
        <input type="text" id="annText" placeholder="e.g. Free Delivery over Rs. 2000">

        <label>Featured Category</label>
        <input type="text" id="fCat" placeholder="e.g. Top Sellers">

        <button onclick="saveHomeContent()" class="btn-sync btn-green">UPDATE HOME PAGE</button>
    </div>

    <div class="card">
        <h3><i class="fa fa-info-circle"></i> About & Contact</h3>
        <label>WhatsApp Number</label>
        <input type="text" id="cWa" placeholder="+923000000000">
        
        <label>Store Address</label>
        <textarea id="cAddr" rows="2"></textarea>
        
        <label>About Us Short Text</label>
        <textarea id="cAbout" rows="3"></textarea>
        
        <label>Facebook Page Link</label>
        <input type="text" id="cLink" placeholder="https://facebook.com/...">

        <button onclick="saveContactSettings()" class="btn-sync btn-green">SAVE INFO</button>
    </div>

    <div class="card" style="grid-column: span 1;">
        <h3><i class="fa fa-plus-circle"></i> Add New Product</h3>
        <div class="upload-grid">
            <div class="up-box" onclick="document.getElementById('i1').click()"><i class="fa fa-camera"></i><span id="l1">Main</span><input type="file" id="i1" hidden onchange="upImg(this, 'p1', 'l1')"></div>
            <div class="up-box" onclick="document.getElementById('i2').click()"><i class="fa fa-image"></i><span id="l2">Img 2</span><input type="file" id="i2" hidden onchange="upImg(this, 'p2', 'l2')"></div>
            <div class="up-box" onclick="document.getElementById('i3').click()"><i class="fa fa-image"></i><span id="l3">Img 3</span><input type="file" id="i3" hidden onchange="upImg(this, 'p3', 'l3')"></div>
        </div>
        
        <input type="text" id="pName" placeholder="Product Name">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <input type="number" id="pPrice" placeholder="Price">
            <input type="number" id="pOld" placeholder="Old Price">
        </div>
        <select id="pCat">
            <option value="Earbuds">Earbuds</option>
            <option value="Watches">Smart Watches</option>
            <option value="Cables">Data Cables</option>
            <option value="Chargers">Chargers</option>
        </select>
        <textarea id="pDesc" placeholder="Product details..." rows="3"></textarea>
        
        <button id="pBtn" onclick="saveProduct()" class="btn-sync">UPLOAD TO STORE</button>
    </div>

    <div class="card">
        <h3><i class="fa fa-warehouse"></i> Inventory</h3>
        <div id="invList" style="max-height: 500px; overflow-y: auto;">
            </div>
    </div>

</div>

<div id="toast">✅ Success</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCYzkMGDwWZGx_PlrNfjloYZ6PVQRne9wg",
        authDomain: "web-app-4f3a1.firebaseapp.com",
        projectId: "web-app-4f3a1",
        databaseURL: "https://web-app-4f3a1-default-rtdb.firebaseio.com",
        appId: "1:222099203820:web:778e204d2960181dfba7c9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const IMGBB_KEY = "6d9d7a90a22cdb8a25ed839df7365b8c";

    let tempImgs = { p1: "", p2: "", p3: "" };

    // AUTH
    window.login = () => {
        signInWithEmailAndPassword(auth, emailIn.value, passIn.value).catch(e => alert(e.message));
    };
    onAuthStateChanged(auth, u => {
        if(u && u.email === "r.haidar0066@gmail.com") {
            loginOverlay.style.display = 'none';
            adminPanel.style.display = 'grid';
            loadAllSettings();
        }
    });
    window.logout = () => signOut(auth).then(() => location.reload());

    // LOAD DATA
    function loadAllSettings() {
        onValue(ref(db, 'siteSettings'), (s) => {
            const data = s.val() || {};
            document.getElementById('sName').value = data.name || "";
            document.getElementById('hColor').value = data.hColor || "#000000";
            document.getElementById('fColor').value = data.fColor || "#000000";
            document.getElementById('aColor').value = data.aColor || "#005f6b";
            document.getElementById('sGrid').value = data.grid || "2";
        });

        onValue(ref(db, 'homeContent'), (s) => {
            const data = s.val() || {};
            document.getElementById('bUrl').value = data.banner || "";
            document.getElementById('hText').value = data.heroH || "";
            document.getElementById('annText').value = data.ann || "";
            document.getElementById('fCat').value = data.fCat || "";
        });

        onValue(ref(db, 'contactInfo'), (s) => {
            const data = s.val() || {};
            document.getElementById('cWa').value = data.wa || "";
            document.getElementById('cAddr').value = data.addr || "";
            document.getElementById('cAbout').value = data.about || "";
            document.getElementById('cLink').value = data.fb || "";
        });

        onValue(ref(db, 'products'), (s) => {
            const list = document.getElementById('invList');
            list.innerHTML = "";
            if(s.exists()) {
                Object.entries(s.val()).reverse().forEach(([id, p]) => {
                    list.innerHTML += `
                        <div class="inv-item">
                            <img src="${p.img}">
                            <div class="inv-info">
                                <h4>${p.name}</h4>
                                <p>Rs.${p.price} | ${p.category}</p>
                            </div>
                            <i class="fa fa-trash del-btn" onclick="delProd('${id}')"></i>
                        </div>`;
                });
            }
        });
    }

    // SAVE ACTIONS
    window.saveWebSettings = () => {
        set(ref(db, 'siteSettings'), {
            name: sName.value, hColor: hColor.value, fColor: fColor.value, aColor: aColor.value, grid: sGrid.value
        }).then(() => toastIt("Design Updated!"));
    };

    window.saveHomeContent = () => {
        set(ref(db, 'homeContent'), {
            banner: bUrl.value, heroH: hText.value, ann: annText.value, fCat: fCat.value
        }).then(() => toastIt("Home Page Updated!"));
    };

    window.saveContactSettings = () => {
        set(ref(db, 'contactInfo'), {
            wa: cWa.value, addr: cAddr.value, about: cAbout.value, fb: cLink.value
        }).then(() => toastIt("Info Saved!"));
    };

    // IMAGE UPLOAD
    window.upImg = async (input, key, labelId) => {
        const file = input.files[0]; if(!file) return;
        document.getElementById(labelId).innerText = "⏳...";
        const fd = new FormData(); fd.append("image", file);
        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: fd });
        const json = await res.json();
        tempImgs[key] = json.data.url;
        document.getElementById(labelId).innerText = "READY ✅";
    };

    window.saveProduct = () => {
        const p = {
            name: pName.value, price: Number(pPrice.value), oldPrice: Number(pOld.value),
            category: pCat.value, desc: pDesc.value, img: tempImgs.p1, 
            img2: tempImgs.p2, img3: tempImgs.p3, time: Date.now()
        };
        if(!p.name || !p.img) return alert("Name and Main Image required!");
        push(ref(db, 'products'), p).then(() => {
            toastIt("Product Added!");
            setTimeout(() => location.reload(), 1000);
        });
    };

    window.delProd = (id) => confirm("Delete this?") && remove(ref(db, 'products/'+id));

    function toastIt(m) {
        toast.innerText = m; toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }
</script>
</body>
</html>
