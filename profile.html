<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Haider Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { font-family: 'Jost', sans-serif; background: #f8f9fa; padding: 20px; }
        .container { max-width: 500px; margin: 30px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { color: #005f6b; margin-bottom: 20px; text-align: center; }
        label { display: block; margin-top: 15px; font-weight: 500; font-size: 14px; }
        input, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: inherit; }
        .btn { width: 100%; padding: 15px; background: #005f6b; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 25px; font-weight: 600; font-size: 16px; transition: 0.3s; }
        .btn:hover { background: #004040; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #666; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2><i class="fas fa-user-circle"></i> Customer Profile</h2>
    <p id="userEmail" style="text-align: center; color: #888; font-size: 13px;"></p>

    <label>Full Name</label>
    <input type="text" id="custName" placeholder="Enter your full name">

    <label>WhatsApp Number</label>
    <input type="number" id="custPhone" placeholder="03xxxxxxxxx">

    <label>Delivery Address</label>
    <textarea id="custAddress" rows="3" placeholder="Full home address (House #, Street, City)"></textarea>

    <button class="btn" id="saveBtn">SAVE PROFILE DETAILS</button>
    <a href="index.html" class="back-link">← Back to Store</a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCYzkMGDwWZGx_PlrNfjloYZ6PVQRne9wg",
        authDomain: "web-app-4f3a1.firebaseapp.com",
        projectId: "web-app-4f3a1",
        databaseURL: "https://web-app-4f3a1-default-rtdb.firebaseio.com",
        appId: "1:222099203820:web:778e204d2960181dfba7c9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('userEmail').innerText = user.email;
            // Load existing data
            get(ref(db, 'users/' + user.uid)).then((snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    document.getElementById('custName').value = data.name || '';
                    document.getElementById('custPhone').value = data.phone || '';
                    document.getElementById('custAddress').value = data.address || '';
                }
            });
        } else {
            window.location.href = 'auth.html';
        }
    });

    document.getElementById('saveBtn').onclick = () => {
        const user = auth.currentUser;
        if (!user) return;

        const data = {
            name: document.getElementById('custName').value,
            phone: document.getElementById('custPhone').value,
            address: document.getElementById('custAddress').value,
            email: user.email
        };

        set(ref(db, 'users/' + user.uid), data).then(() => {
            alert("✅ Profile details saved successfully!");
            window.location.href = 'index.html';
        }).catch(err => alert(err.message));
    };
</script>
</body>
</html>
