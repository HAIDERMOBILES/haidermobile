<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Haider Store</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root { 
            --primary: #005f6b; 
            --header-dark: #004040; 
            --text-dark: #1a1a1a; 
            --white: #ffffff; 
            --accent: #ff4d4d;
            --wa-green: #25d366;
            --footer-bg: #0d1117;
            --light-gray: #f8f9fa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Jost', sans-serif; background: #fff; color: var(--text-dark); overflow-x: hidden; }

        /* --- HEADER --- */
        header {
            background: var(--header-dark); 
            padding: 15px 5%; display: flex;
            justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 3000;
        }
        .logo { font-size: 24px; font-weight: 700; color: var(--white) !important; text-decoration: none; }
        .logo span { color: var(--accent); }
        nav { display: flex; gap: 30px; align-items: center; }
        nav a { text-decoration: none; color: var(--white) !important; font-weight: 500; font-size: 14px; transition: 0.3s; text-transform: uppercase; }
        .cart-icon-wrapper { position: relative; cursor: pointer; color: white; font-size: 20px; }
        .cart-badge {
            position: absolute; top: -10px; right: -12px; background: var(--accent);
            color: white; font-size: 10px; font-weight: 700; width: 18px; height: 18px;
            display: flex; align-items: center; justify-content: center; border-radius: 50%;
        }

        /* --- PRODUCT SECTION --- */
        .main-container { max-width: 1200px; margin: 30px auto; padding: 0 5%; }
        .top-section { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 40px; margin-bottom: 40px; }

        /* --- ENHANCED SLIDER --- */
        .slider-area { position: relative; }
        .slider-container {
            position: relative; width: 100%; height: 500px;
            background: var(--light-gray); border-radius: 20px; overflow: hidden;
            border: 1px solid #eee;
        }
        .slider-wrapper { display: flex; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); height: 100%; }
        .img-box { min-width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .img-box img { max-width: 90%; max-height: 90%; object-fit: contain; transition: transform 0.5s ease; cursor: zoom-in; }
        .img-box img:hover { transform: scale(1.25); }

        /* Slider Dots */
        .slider-dots { display: flex; justify-content: center; gap: 8px; margin-top: 15px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #ddd; cursor: pointer; transition: 0.3s; }
        .dot.active { background: var(--primary); width: 25px; border-radius: 10px; }

        /* --- PRODUCT INFO --- */
        .p-info-side { display: flex; flex-direction: column; gap: 15px; }
        .p-title { font-size: 34px; font-weight: 700; color: #111; line-height: 1.2; }
        .p-price { font-size: 36px; color: var(--primary); font-weight: 800; margin: 10px 0; }
        
        /* Trust Badges */
        .trust-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; border-top: 1px solid #eee; padding-top: 20px; }
        .t-item { text-align: center; font-size: 11px; font-weight: 600; color: #666; text-transform: uppercase; }
        .t-item i { display: block; font-size: 20px; color: var(--primary); margin-bottom: 5px; }

        /* Buttons */
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        .btn-cart { 
            width: 100%; padding: 18px; background: var(--primary); color: white; 
            border: none; border-radius: 12px; font-weight: 700; font-size: 16px;
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-cart:hover { filter: brightness(1.2); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,95,107,0.2); }
        
        .btn-wa { 
            width: 100%; padding: 16px; background: transparent; color: var(--wa-green); 
            border: 2px solid var(--wa-green); border-radius: 12px; font-weight: 700; 
            text-decoration: none; text-align: center; transition: 0.3s;
        }
        .btn-wa:hover { background: var(--wa-green); color: white; }

        /* --- DESCRIPTION --- */
        .desc-section { background: var(--light-gray); padding: 30px; border-radius: 20px; margin-top: 30px; }
        .desc-title { font-size: 20px; font-weight: 700; margin-bottom: 15px; border-bottom: 2px solid var(--primary); display: inline-block; }

        /* --- RELATED --- */
        .related-section { margin-top: 60px; padding-top: 40px; }
        .related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .rel-card { background: #fff; border: 1px solid #eee; border-radius: 15px; padding: 15px; transition: 0.3s; text-decoration: none; color: inherit; text-align: center; cursor: pointer; }
        .rel-card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.06); }
        .rel-img { width: 100%; height: 180px; object-fit: contain; }

        /* --- FOOTER --- */
        footer { background: var(--footer-bg); color: #fff; padding: 60px 5% 30px; margin-top: 80px; }
        .f-cols { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 40px; }

        @media (max-width: 768px) {
            .top-section { grid-template-columns: 1fr; }
            .slider-container { height: 350px; }
            .related-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">HAIDER <span>STORE</span></a>
    <nav>
        <a href="index.html">Home</a>
        <a href="index.html#products">Shop</a>
    </nav>
    <div class="cart-icon-wrapper" onclick="location.href='index.html'">
        <i class="fas fa-shopping-cart"></i>
        <span id="cartBadge" class="cart-badge">0</span>
    </div>
</header>

<div class="main-container">
    <div class="top-section">
        <div class="slider-area">
            <div class="slider-container">
                <div class="slider-wrapper" id="sliderWrapper"></div>
            </div>
            <div class="slider-dots" id="sliderDots"></div>
        </div>

        <div class="p-info-side">
            <h1 class="p-title" id="pName">Loading...</h1>
            <div class="p-price" id="pPrice">Rs. 0</div>
            
            <div class="trust-grid">
                <div class="t-item"><i class="fas fa-truck-fast"></i>Fast Delivery</div>
                <div class="t-item"><i class="fas fa-shield-check"></i>7 Days Warranty</div>
                <div class="t-item"><i class="fas fa-box-open"></i>Open Parcel</div>
            </div>
            
            <div class="btn-group">
                <button class="btn-cart" id="addBtn"><i class="fas fa-shopping-bag"></i> ADD TO CART</button>
                <a id="waLink" href="#" target="_blank" class="btn-wa"><i class="fab fa-whatsapp"></i> BUY ON WHATSAPP</a>
            </div>
        </div>
    </div>

    <div class="desc-section">
        <h3 class="desc-title">Product Description</h3>
        <p id="fullDesc" style="line-height: 1.8; color: #444; white-space: pre-line;">Loading...</p>
    </div>

    <div class="related-section">
        <h2 style="margin-bottom:25px; text-align:center;">Recommended Items</h2>
        <div class="related-grid" id="relatedGrid"></div>
    </div>
</div>

<footer>
    <div class="f-cols">
        <div><h3>HAIDER STORE</h3><p style="opacity:0.6; font-size:14px; margin-top:10px;">Pakistan's Trusted Tech Store.</p></div>
        <div><h4>Quick Links</h4><a href="shipping.html" style="color:#bbb; text-decoration:none; display:block; margin-top:8px;">Shipping Policy</a></div>
    </div>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCYzkMGDwWZGx_PlrNfjloYZ6PVQRne9wg",
        authDomain: "web-app-4f3a1.firebaseapp.com",
        projectId: "web-app-4f3a1",
        databaseURL: "https://web-app-4f3a1-default-rtdb.firebaseio.com",
        appId: "1:222099203820:web:778e204d2960181dfba7c9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let sliderInterval;
    let currentStep = 0;

    function initPage() {
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        if (!productId) return;

        window.scrollTo(0, 0);
        if(sliderInterval) clearInterval(sliderInterval);

        get(ref(db, `products/${productId}`)).then((s) => {
            if (s.exists()) {
                const data = s.val();
                document.getElementById('pName').innerText = data.name;
                document.getElementById('pPrice').innerText = `Rs. ${Number(data.price).toLocaleString()}`;
                document.getElementById('fullDesc').innerText = data.description || "";
                document.getElementById('waLink').href = `https://wa.me/923279518790?text=I want to order: ${data.name}`;

                const wrapper = document.getElementById('sliderWrapper');
                const dotsCont = document.getElementById('sliderDots');
                const imgs = [data.img, data.img2, data.img3].filter(x => x);
                
                // Set Images & Dots
                wrapper.innerHTML = imgs.map(src => `<div class="img-box"><img src="${src}"></div>`).join('');
                dotsCont.innerHTML = imgs.map((_, i) => `<div class="dot ${i==0?'active':''}" data-index="${i}"></div>`).join('');

                // Dot Click Logic
                document.querySelectorAll('.dot').forEach(dot => {
                    dot.onclick = (e) => {
                        currentStep = parseInt(e.target.dataset.index);
                        updateSlider(imgs.length);
                    };
                });

                // Auto Slide
                if(imgs.length > 1) {
                    sliderInterval = setInterval(() => {
                        currentStep = (currentStep + 1) % imgs.length;
                        updateSlider(imgs.length);
                    }, 4500);
                }

                loadRelated(productId);

                document.getElementById('addBtn').onclick = () => {
                    let cart = JSON.parse(localStorage.getItem('haiderStoreCart')) || [];
                    cart.push({ id: productId, name: data.name, price: data.price, image: data.img, quantity: 1 });
                    localStorage.setItem('haiderStoreCart', JSON.stringify(cart));
                    updateCartBadge();
                    alert("Added to Cart!");
                };
            }
        });
    }

    function updateSlider(total) {
        const wrapper = document.getElementById('sliderWrapper');
        const dots = document.querySelectorAll('.dot');
        wrapper.style.transform = `translateX(-${currentStep * 100}%)`;
        dots.forEach((d, i) => d.classList.toggle('active', i === currentStep));
    }

    function loadRelated(currentId) {
        get(ref(db, 'products')).then((snapshot) => {
            const grid = document.getElementById('relatedGrid');
            if (snapshot.exists()) {
                let list = [];
                snapshot.forEach(c => { if(c.key !== currentId) list.push({...c.val(), id: c.key}) });
                list.sort(() => Math.random() - 0.5);
                
                grid.innerHTML = list.slice(0, 8).map(p => `
                    <div class="rel-card" onclick="window.location.search='?id=${p.id}'">
                        <img src="${p.img}" class="rel-img">
                        <p style="font-weight:600; font-size:14px; margin:10px 0;">${p.name}</p>
                        <p style="color:var(--primary); font-weight:700;">Rs. ${Number(p.price).toLocaleString()}</p>
                    </div>
                `).join('');
            }
        });
    }

    function updateCartBadge() {
        const cart = JSON.parse(localStorage.getItem('haiderStoreCart')) || [];
        document.getElementById('cartBadge').innerText = cart.length;
    }

    initPage();
    updateCartBadge();
    window.addEventListener('popstate', () => location.reload());
</script>

</body>
</html>
