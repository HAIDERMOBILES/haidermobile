<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Haider Store</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root { 
            --primary: #005f6b; 
            --header-dark: #004040; 
            --text-dark: #1a1a1a; 
            --white: #ffffff; 
            --accent: #ff4d4d;
            --royal-blue: #0056b3;
            --footer-bg: #0d1117;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Jost', sans-serif; background: #fff; color: var(--text-dark); overflow-x: hidden; }

        /* --- HEADER --- */
        header {
            background: var(--header-dark); 
            padding: 15px 5%; display: flex;
            justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 3000;
        }
        .logo { font-size: 24px; font-weight: 700; color: var(--white) !important; text-decoration: none; }
        .logo span { color: var(--accent); }

        nav { display: flex; gap: 30px; align-items: center; }
        nav a { text-decoration: none; color: var(--white) !important; font-weight: 500; font-size: 15px; transition: 0.3s; opacity: 0.9; }
        nav a:hover { opacity: 1; color: var(--accent) !important; }

        .cart-icon-wrapper { position: relative; cursor: pointer; color: white; font-size: 20px; }
        .cart-badge {
            position: absolute; top: -10px; right: -12px; background: var(--accent);
            color: white; font-size: 10px; font-weight: 700; width: 18px; height: 18px;
            display: flex; align-items: center; justify-content: center; border-radius: 50%;
        }

        /* --- PRODUCT AREA --- */
        .main-container { max-width: 1200px; margin: 30px auto; padding: 0 5%; }
        .top-section { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 40px; margin-bottom: 40px; }

        .slider-container {
            position: relative; width: 100%; height: 480px;
            background: #fdfdfd; border-radius: 15px; overflow: hidden;
            border: 1px solid #eee; display: flex; align-items: center;
        }
        .slider-wrapper { display: flex; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); height: 100%; width: 100%; }
        .img-box { min-width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        .img-box img { max-width: 90%; max-height: 90%; object-fit: contain; }

        .p-info-side { display: flex; flex-direction: column; gap: 15px; justify-content: center; }
        .p-title { font-size: 34px; font-weight: 700; color: #111; line-height: 1.2; }
        .p-price { font-size: 30px; color: var(--primary); font-weight: 700; }

        .btn-wa { display: block; padding: 16px; background: #25d366; color: #fff; border-radius: 8px; text-decoration: none; font-weight: 700; text-align: center; font-size: 16px; }
        .btn-cart { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 16px; }

        /* --- RELATED PRODUCTS SECTION --- */
        .related-section { margin-top: 60px; padding: 20px 0; }
        .related-title { font-size: 24px; font-weight: 700; margin-bottom: 25px; border-left: 5px solid var(--primary); padding-left: 15px; }
        .related-grid { 
            display: flex; gap: 20px; overflow-x: auto; padding-bottom: 20px;
            scrollbar-width: thin; scrollbar-color: var(--primary) #eee;
        }
        .related-grid::-webkit-scrollbar { height: 6px; }
        .related-grid::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        .rel-card { 
            min-width: 220px; background: #fff; border: 1px solid #eee; 
            border-radius: 12px; padding: 15px; transition: 0.3s; text-decoration: none; color: inherit;
        }
        .rel-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .rel-img { width: 100%; height: 180px; object-fit: contain; margin-bottom: 10px; }
        .rel-name { font-weight: 600; font-size: 15px; height: 40px; overflow: hidden; margin-bottom: 8px; display: block; }
        .rel-price { color: var(--primary); font-weight: 700; font-size: 16px; }

        footer { background: var(--footer-bg); color: #ffffff; padding: 60px 5% 30px; margin-top: 80px; }
        .f-cols { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 40px; }
        .f-links a { color: #fff !important; text-decoration: none; opacity: 0.8; display: block; margin-bottom: 10px; font-size: 14px; }

        @media (max-width: 768px) {
            .top-section { grid-template-columns: 1fr; }
            .slider-container { height: 350px; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">HAIDER <span>STORE</span></a>
    <nav>
        <a href="index.html">Home</a>
        <a href="index.html#products">Shop</a>
        <a href="shipping.html">Shipping</a>
        <a href="contact.html">Contact</a>
    </nav>
    <div class="cart-icon-wrapper" onclick="location.href='index.html'">
        <i class="fas fa-shopping-cart"></i>
        <span id="cartBadge" class="cart-badge">0</span>
    </div>
</header>

<div class="main-container">
    <div class="top-section" id="productHero">
        <div class="slider-container">
            <div class="slider-wrapper" id="sliderWrapper"></div>
        </div>
        <div class="p-info-side">
            <h1 class="p-title" id="pName">Loading...</h1>
            <div class="p-price" id="pPrice">Rs. 0</div>
            <p style="color:var(--royal-blue);"><i class="fas fa-check-circle"></i> Original Quality Guaranteed</p>
            <div style="margin-top: 20px; display: flex; flex-direction: column; gap: 10px;">
                <button class="btn-cart" id="addBtn"><i class="fas fa-cart-plus"></i> ADD TO CART</button>
                <a id="waLink" href="#" target="_blank" class="btn-wa"><i class="fab fa-whatsapp"></i> ORDER VIA WHATSAPP</a>
            </div>
        </div>
    </div>

    <div class="related-section">
        <h2 class="related-title">You May Also Like</h2>
        <div class="related-grid" id="relatedGrid">
            </div>
    </div>
</div>

<footer>
    <div class="f-cols">
        <div class="f-links">
            <h3 style="margin-bottom:15px;">HAIDER STORE</h3>
            <p style="opacity:0.6; font-size:14px;">Premium Tech Gear in Pakistan.</p>
        </div>
        <div class="f-links">
            <h4>Quick Links</h4>
            <a href="shipping.html">Shipping Policy</a>
            <a href="return.html">Return Policy</a>
        </div>
    </div>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, get, limitToLast, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCYzkMGDwWZGx_PlrNfjloYZ6PVQRne9wg",
        authDomain: "web-app-4f3a1.firebaseapp.com",
        projectId: "web-app-4f3a1",
        databaseURL: "https://web-app-4f3a1-default-rtdb.firebaseio.com",
        appId: "1:222099203820:web:778e204d2960181dfba7c9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const productId = new URLSearchParams(window.location.search).get('id');
    let productData = null;

    if (productId) {
        // Fetch Main Product
        get(ref(db, `products/${productId}`)).then((s) => {
            if (s.exists()) {
                productData = s.val();
                document.getElementById('pName').innerText = productData.name;
                document.getElementById('pPrice').innerText = `Rs. ${Number(productData.price).toLocaleString()}`;
                
                const wrapper = document.getElementById('sliderWrapper');
                const imgs = [productData.img, productData.img2, productData.img3].filter(x => x);
                wrapper.innerHTML = imgs.map(src => `<div class="img-box"><img src="${src}"></div>`).join('');
                
                document.getElementById('waLink').href = `https://wa.me/923279518790?text=Salam! I want to order: ${productData.name}`;
                
                // Fetch Related Products (Limit to 6)
                loadRelated();
            }
        });
    }

    async function loadRelated() {
        const snap = await get(query(ref(db, 'products'), limitToLast(8)));
        const grid = document.getElementById('relatedGrid');
        if (snap.exists()) {
            let html = '';
            snap.forEach((child) => {
                const p = child.val();
                if (child.key !== productId) { // Hide current product from related
                    html += `
                        <a href="product-details.html?id=${child.key}" class="rel-card">
                            <img src="${p.img}" class="rel-img">
                            <span class="rel-name">${p.name}</span>
                            <span class="rel-price">Rs. ${Number(p.price).toLocaleString()}</span>
                        </a>
                    `;
                }
            });
            grid.innerHTML = html;
        }
    }

    document.getElementById('addBtn').onclick = () => {
        if(!productData) return;
        let cart = JSON.parse(localStorage.getItem('haiderStoreCart')) || [];
        cart.push({ id: productId, name: productData.name, price: productData.price, image: productData.img, quantity: 1 });
        localStorage.setItem('haiderStoreCart', JSON.stringify(cart));
        document.getElementById('cartBadge').innerText = cart.length;
        alert("Added to Cart!");
    };
</script>

</body>
</html>
