        :root { 
            --primary: #005f6b; 
            /* --header-dark placeholder, will be dynamic */
            --header-dark-fallback: #004040; /* Original Color as Fallback */
            --text-dark: #1a1a1a; 
            --white: #ffffff; 
            --accent: #ff4d4d; 
            --footer-bg: #0d1117;

        /* --- ✨ INTERNATIONAL TOOLS (NOTHING DELETED) --- */

        #currencySelector, .goog-te-combo {

            color: white !important;
            border: 1px solid rgba(255,255,255,0.2) !important;
            padding: 4px 6px !important;
            border-radius: 4px !important;
            font-size: 11px !important;
            cursor: pointer;
            outline: none;
            font-family: 'Jost', sans-serif !important;
        }

        /* Google Translate Stylings */
        .goog-te-gadget { color: transparent !important; font-size: 0 !important; }
        .goog-te-gadget .goog-te-combo { margin: 0 !important; color: white !important; }
        .goog-te-gadget .goog-te-combo option { color: #333; background: #fff; }
        .goog-te-banner-frame.skiptranslate, .goog-te-gadget-icon, .goog-tooltip { display: none !important; }
        .goog-text-highlight { background-color: transparent !important; border: none !important; box-shadow: none !important; }

        /* --- HEADER (Updated for Dynamic Color) --- */
        header {
            /* Initial fallback background */
            background: var(--header-dark-fallback); 
            padding: 8px 5%; display: flex;
            justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            position: sticky; top: 0; z-index: 3000;
            /* ✨ Transition for smooth color change */
            transition: background 0.5s ease-in-out; 
        }
        
        /* LOGO IMAGE STYLING */
        .logo-container img {
            height: 50px; 
            width: auto;
            display: block;
            border-radius: 4px;
        }
        
        .nav-links { display: flex; list-style: none; gap: 25px; align-items: center; }
        .nav-link { text-decoration: none; color: var(--white) !important; font-weight: 500; font-size: 15px; cursor: pointer; transition: 0.3s; opacity: 0.9; }
        .nav-link:hover { color: var(--accent) !important; opacity: 1; }
        
        header .fas { color: var(--white) !important; }

        /* MOBILE DRAWER */
        .menu-btn { display: none; font-size: 22px; cursor: pointer; color: var(--white) !important; }
        .mobile-drawer {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: var(--white); z-index: 4000; transition: 0.4s ease;
            box-shadow: 10px 0 30px rgba(0,0,0,0.1); padding: 25px; overflow-y: auto;
        }
        .mobile-drawer.open { left: 0; }
        .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 3500; display: none; }
        .drawer-overlay.active { display: block; }
        .drawer-links h4 { font-size: 12px; color: var(--primary); margin: 20px 0 10px; text-transform: uppercase; }
        .drawer-links a { text-decoration: none; color: var(--text-dark); font-weight: 500; display: block; padding: 10px 0; border-bottom: 1px solid #f5f5f5; cursor: pointer; }

        /* ... [Rest of the product grid and cart styles identical] ... */
        .hero-container { height: 480px; background: #f4f4f4; overflow: hidden; position: relative; }
        .section-header { text-align: center; margin: 60px 0 30px; }
        .section-header h2 { font-size: 28px; font-weight: 600; text-transform: uppercase; color: #222; }
        .container { padding: 0 5% 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 25px; }
        .cat-banner { width: 100%; border-radius: 12px; margin-bottom: 30px; cursor: pointer; object-fit: cover; }
        .p-card { display: flex; flex-direction: column; justify-content: space-between; height: 100%; transition: 0.3s; text-align: center; padding: 15px; cursor: pointer; border: 1px solid transparent; position: relative; }
        .p-card:hover { border: 1px solid #eee; box-shadow: 0 10px 20px rgba(0,0,0,0.05); transform: translateY(-5px); }
        .p-img-box { width: 100%; height: 240px; background: #f9f9f9; display: flex; align-items: center; justify-content: center; border-radius: 10px; overflow: hidden; margin-bottom: 15px; }
        .p-img-box img { max-width: 85%; max-height: 85%; object-fit: contain; }
        .p-card h3 { font-size: 15px; min-height: 42px; margin: 8px 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .discount-badge { position: absolute; top: 12px; left: 12px; background: var(--accent); color: white; font-size: 10px; font-weight: 700; padding: 4px 8px; border-radius: 4px; z-index: 5; text-transform: uppercase; }
        .price-box { display: flex; flex-direction: column; align-items: center; gap: 2px; margin-top: 10px; }
        .old-price { font-size: 13px; color: #888; text-decoration: line-through; font-weight: 400; }
        .current-price { font-size: 18px; font-weight: 700; color: var(--primary); }
        .p-brand { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 5px; display: block; }

        footer { background: var(--footer-bg); color: #ffffff; padding: 80px 8% 20px; margin-top: 100px; border-top: 5px solid var(--primary); }
        .f-grid { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1.2fr; gap: 40px; }
        .f-col h4 { font-size: 16px; font-weight: 600; margin-bottom: 25px; color: var(--primary); text-transform: uppercase; position: relative; }
        .f-col h4::after { content: ''; position: absolute; left: 0; bottom: -8px; width: 35px; height: 2px; background: var(--accent); }
        .f-col a { text-decoration: none; color: #ffffff; opacity: 0.8; transition: 0.3s; cursor: pointer; }
        .f-col a:hover { opacity: 1; color: var(--accent); }
        
        .cart-sidebar { position: fixed; top: 0; right: -100%; width: 350px; max-width: 100%; height: 100vh; background: #fff; box-shadow: -5px 0 25px rgba(0,0,0,0.15); transition: 0.4s; z-index: 10000; display: flex; flex-direction: column; }
        .cart-sidebar.open { right: 0; }
        .cart-header { padding: 20px; background: var(--header-dark-fallback); color: white; display: flex; justify-content: space-between; align-items: center; transition: background 0.5s ease-in-out; }
        .cart-badge { position: absolute; top: -8px; right: -10px; background: var(--accent); color: white; font-size: 10px; font-weight: 700; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 2px solid var(--header-dark); }

        @media (max-width: 768px) {

            .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .nav-links { display: none; }

            .f-grid { grid-template-columns: 1fr; text-align: center; }
            .f-col h4::after { left: 50%; transform: translateX(-50%); }
        }
    </style>
</head>

<script>
    const logo = document.getElementById('logoImg');
    const header = document.getElementById('mainHeaderDynamic');
    const cartHeader = document.getElementById('cartHeaderDynamic');
    const colorThief = new ColorThief();

    function setDynamicHeaderColor() {
        // analyze logo and get dominant color
        let dominantColor;
        try {
            dominantColor = colorThief.getColor(logo);
        } catch (error) {
            console.warn("Could not extract color from logo, using fallback.");
            return; // Exit if failed, fallback remains
        }
        
        // dominantColor is an array of [R, G, B]
        const rgbColor = `rgb(${dominantColor[0]}, ${dominantColor[1]}, ${dominantColor[2]})`;
        
        // Apply color to Header background
        header.style.background = rgbColor;
        cartHeader.style.background = rgbColor;

        // ✨ OPTIONAL: Smart Text Color (Light or Dark text based on background brightness)
        // This makes sure text remains readable
        const brightness = Math.round(((parseInt(dominantColor[0]) * 299) +
                          (parseInt(dominantColor[1]) * 587) +
                          (parseInt(dominantColor[2]) * 114)) / 1000);
        
        if (brightness > 125) {
            // Bright background -> use Dark text
            document.querySelectorAll('#mainHeaderDynamic .nav-link, #mainHeaderDynamic .fas, #mainHeaderDynamic .logo-container').forEach(el => el.style.color = '#000000');
            document.getElementById('cartBadge').style.borderColor = rgbColor; // Fix badge border
        } else {
            // Dark background -> use White text
            document.querySelectorAll('#mainHeaderDynamic .nav-link, #mainHeaderDynamic .fas, #mainHeaderDynamic .logo-container').forEach(el => el.style.color = '#ffffff');
            document.getElementById('cartBadge').style.borderColor = rgbColor; // Fix badge border
        }
    }

    // Run when logo image is loaded
    if (logo.complete) {
        setDynamicHeaderColor();
    } else {
        logo.addEventListener('load', function() {
            setDynamicHeaderColor();
        });
    }
</script>
