<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCYzkMGDwWZGx_PlrNfjloYZ6PVQRne9wg",
        authDomain: "web-app-4f3a1.firebaseapp.com",
        projectId: "web-app-4f3a1",
        databaseURL: "https://web-app-4f3a1-default-rtdb.firebaseio.com",
        appId: "1:222099203820:web:778e204d2960181dfba7c9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let allProducts = [];
    let cart = JSON.parse(localStorage.getItem('haiderStoreCart')) || [];
    let searchTimer = null;

    // --- 💰 CURRENCY ENGINE ---
    const currencyData = {
        PKR: { s: "Rs.", r: 1 }, USD: { s: "$", r: 0.0036 }, SAR: { s: "SR", r: 0.013 },
        AED: { s: "Dh", r: 0.013 }, INR: { s: "₹", r: 0.30 }, GBP: { s: "£", r: 0.0028 },
        EUR: { s: "€", r: 0.0033 }, CAD: { s: "C$", r: 0.0048 }, TRY: { s: "₺", r: 0.11 }, KWD: { s: "KD", r: 0.0011 }
    };
    let currentCurrency = localStorage.getItem('haiderCurrency') || 'PKR';

    window.changeCurrency = (code) => {
        currentCurrency = code;
        localStorage.setItem('haiderCurrency', code);
        renderProducts(allProducts, 'ALL');
        updateCartUI();
    };

    function formatPrice(val) {
        const c = currencyData[currentCurrency] || currencyData.PKR;
        return `${c.s} ${Math.round(val * c.r).toLocaleString()}`;
    }

    // --- 🔔 TOAST ---
    function showToast(msg) {
        const toast = document.getElementById('toast');
        document.getElementById('toastMsg').textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2200);
    }

    // --- 🖼️ SAFE IMAGE LOADER ---
    function safeLoadImage(imgEl, url) {
        if (!url || url === '') {
            imgEl.style.display = 'none';
            return;
        }
        imgEl.src = url;
        imgEl.onload = () => {
            imgEl.style.display = 'block';
            imgEl.classList.add('loaded');
        };
    }

    // --- ✨ REVEAL ANIMATIONS ---
    function reveal() {
        document.querySelectorAll(".reveal").forEach(r => {
            if (r.getBoundingClientRect().top < window.innerHeight - 50) r.classList.add("active");
        });
    }
    window.addEventListener("scroll", reveal);

    // --- 🔍 SEARCH & FILTERS ---
    window.setFilter = (cat) => {
        document.getElementById('searchOverlay').classList.remove('active');
        document.getElementById('drawer').classList.remove('open');
        document.getElementById('overlay').classList.remove('active');
        document.querySelector('.hero-container').style.display = (cat === 'ALL') ? 'block' : 'none';
        renderProducts(allProducts, cat);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    window.debounceSearch = () => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
            const term = document.getElementById('searchInput').value.toLowerCase().trim();
            if (term.length > 0) {
                const filtered = allProducts.filter(p => 
                    p.name.toLowerCase().includes(term) || 
                    (p.brand && p.brand.toLowerCase().includes(term))
                );
                document.getElementById('accTitle').innerText = `Search: "${term}"`;
                renderProducts(filtered, 'SEARCH');
            } else {
                setFilter('ALL');
            }
        }, 300);
    };

    // --- 🛒 CART LOGIC ---
    window.addToCart = (id) => {
        const prod = allProducts.find(p => p.id === id);
        const exists = cart.find(item => item.id === id);
        if (exists) {
            exists.qty++;
        } else {
            cart.push({ ...prod, qty: 1 });
        }
        localStorage.setItem('haiderStoreCart', JSON.stringify(cart));
        updateCartUI();
        showToast("Added to cart!");
        document.getElementById('cartBadge').classList.add('bump');
        setTimeout(() => document.getElementById('cartBadge').classList.remove('bump'), 300);
    };

    window.updateQty = (id, delta) => {
        const item = cart.find(i => i.id === id);
        if (item) {
            item.qty += delta;
            if (item.qty <= 0) cart = cart.filter(i => i.id !== id);
            localStorage.setItem('haiderStoreCart', JSON.stringify(cart));
            updateCartUI();
        }
    };

    function updateCartUI() {
        const container = document.getElementById('cartItemsContainer');
        const badge = document.getElementById('cartBadge');
        const totalEl = document.getElementById('cartTotal');
        
        badge.innerText = cart.reduce((acc, item) => acc + item.qty, 0);
        
        if (cart.length === 0) {
            container.innerHTML = `<div class="cart-empty"><i class="fas fa-shopping-basket"></i><p>Your cart is empty</p></div>`;
            totalEl.innerText = formatPrice(0);
            return;
        }

        let total = 0;
        container.innerHTML = cart.map(item => {
            total += (item.price * item.qty);
            return `
                <div class="cart-item">
                    <img src="${item.image}" alt="${item.name}">
                    <div style="flex:1">
                        <h4 style="font-size:14px; margin-bottom:5px;">${item.name}</h4>
                        <p style="font-weight:700; color:var(--primary);">${formatPrice(item.price)}</p>
                        <div style="display:flex; align-items:center; gap:10px; margin-top:8px;">
                            <button class="qty-btn" onclick="updateQty('${item.id}', -1)">-</button>
                            <span>${item.qty}</span>
                            <button class="qty-btn" onclick="updateQty('${item.id}', 1)">+</button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
        totalEl.innerText = formatPrice(total);
    }

    window.checkout = () => {
        if (cart.length === 0) return alert("Cart is empty!");
        let msg = "Hello Haider Store! I want to order:%0A%0A";
        cart.forEach(item => {
            msg += `• ${item.name} (Qty: ${item.qty}) - ${formatPrice(item.price * item.qty)}%0A`;
        });
        msg += `%0A*Total: ${document.getElementById('cartTotal').innerText}*`;
        window.open(`https://wa.me/923279518790?text=${msg}`, '_blank');
    };

    // --- 🏗️ RENDERING ---
    function createCard(p) {
        const discount = p.oldPrice ? Math.round(((p.oldPrice - p.price) / p.oldPrice) * 100) : 0;
        return `
            <div class="p-card reveal zoom-in">
                ${discount > 0 ? `<div class="discount-badge">-${discount}% OFF</div>` : ''}
                <div class="p-img-box">
                    <img src="${p.image}" alt="${p.name}" loading="lazy">
                </div>
                <span class="p-brand">${p.brand || 'Premium'}</span>
                <h3>${p.name}</h3>
                <div class="price-box">
                    ${p.oldPrice ? `<span class="old-price">${formatPrice(p.oldPrice)}</span>` : ''}
                    <span class="current-price">${formatPrice(p.price)}</span>
                </div>
                <button class="add-btn" onclick="addToCart('${p.id}')">Add to Cart</button>
            </div>
        `;
    }

    function renderProducts(products, filter) {
        const sections = ['earbudsSec', 'headSec', 'chargerSec', 'accessoriesSec'];
        const grids = {
            Earbuds: document.getElementById('earbudsGrid'),
            Headphones: document.getElementById('headphoneGrid'),
            'Data Cables': document.getElementById('chargerGrid'),
            'Fast Chargers': document.getElementById('chargerGrid')
        };

        // Reset
        sections.forEach(s => document.getElementById(s).style.display = 'none');
        Object.values(grids).forEach(g => g.innerHTML = '');
        document.getElementById('accessoriesGrid').innerHTML = '';

        if (filter === 'ALL') {
            sections.forEach(s => document.getElementById(s).style.display = 'block');
            products.forEach(p => {
                const target = grids[p.category] || document.getElementById('accessoriesGrid');
                target.innerHTML += createCard(p);
            });
        } else if (filter === 'SEARCH') {
            document.getElementById('accessoriesSec').style.display = 'block';
            const grid = document.getElementById('accessoriesGrid');
            if (products.length === 0) {
                grid.innerHTML = `<div class="no-results"><i class="fas fa-search"></i><p>No products found.</p></div>`;
            } else {
                products.forEach(p => grid.innerHTML += createCard(p));
            }
        } else {
            document.getElementById('accessoriesSec').style.display = 'block';
            document.getElementById('accTitle').innerText = filter;
            const filtered = products.filter(p => p.category === filter);
            filtered.forEach(p => document.getElementById('accessoriesGrid').innerHTML += createCard(p));
        }
        setTimeout(reveal, 200);
    }

    // --- 🔥 DATA INITIALIZATION ---
    onValue(ref(db, 'settings'), snap => {
        const s = snap.val();
        if (s) {
            safeLoadImage(document.getElementById('syncBanner'), s.heroBanner);
            safeLoadImage(document.getElementById('earBannerSync'), s.earbudsBanner);
            safeLoadImage(document.getElementById('headBannerSync'), s.headphoneBanner);
            safeLoadImage(document.getElementById('chargerBannerSync'), s.chargerBanner);
        }
    });

    onValue(ref(db, 'products'), snap => {
        if (snap.exists()) {
            allProducts = Object.keys(snap.val()).map(id => ({ id, ...snap.val()[id] })).reverse();
            document.getElementById('skeletonLoader').style.display = 'none';
            document.getElementById('currencySelector').value = currentCurrency;
            renderProducts(allProducts, 'ALL');
            updateCartUI();
        }
    });

    // Global toggle functions
    window.toggleCart = () => {
        const sidebar = document.getElementById('cartSidebar');
        sidebar.classList.toggle('open');
        document.getElementById('cartOverlay').style.display = sidebar.classList.contains('open') ? 'block' : 'none';
    };
    window.toggleMenu = () => {
        document.getElementById('drawer').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('active');
    };
    window.toggleSearch = () => {
        const searchBox = document.getElementById('searchOverlay');
        searchBox.classList.toggle('active');
        if (searchBox.classList.contains('active')) setTimeout(() => document.getElementById('searchInput').focus(), 150);
    };
</script>
</body>
</html>
