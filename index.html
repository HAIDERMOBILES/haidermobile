<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haider Store | Premium Tech Accessories</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css"/>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick-theme.css"/>

    <style>
        :root { 
            --primary: #a17903; 
            --header-dark: #a35c1d; 
            --text-dark: #1a1a1a; 
            --white: #ffffff; 
            --accent: #40705f; 
            --footer-bg: #202c3d;
            --apple-bg: #f5f5f7;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Jost', sans-serif; background-color: var(--white); color: var(--text-dark); }

        header {
            background: var(--header-dark); 
            padding: 15px 5%; display: flex;
            justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 3000;
        }
        .logo { font-size: 24px; font-weight: 700; color: var(--white) !important; text-decoration: none; }
        .logo span { color: var(--accent); }
        
        .nav-links { display: flex; list-style: none; gap: 20px; align-items: center; }
        .nav-link { text-decoration: none; color: white !important; font-size: 14px; font-weight: 500; cursor: pointer; }

        .nav-item { position: static; }
        .mega-menu {
            position: absolute; top: 100%; left: 0; width: 100%; background: white;
            display: grid; grid-template-columns: repeat(4, 1fr); padding: 30px 10%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); opacity: 0; visibility: hidden; transition: 0.3s;
        }
        .nav-item:hover .mega-menu { opacity: 1; visibility: visible; }
        .menu-col h4 { color: var(--primary); margin-bottom: 10px; font-size: 13px; text-transform: uppercase; }
        .menu-col a { display: block; text-decoration: none; color: #333; padding: 5px 0; font-size: 14px; cursor: pointer; }

        .section-header { text-align: left; margin: 50px 5% 20px; }
        .section-header h2 { font-size: 28px; font-weight: 700; }
        
        .slider-container { padding: 0 4%; margin-bottom: 40px; }
        .p-card { 
            background: var(--apple-bg); border-radius: 20px; padding: 20px; 
            margin: 10px; text-align: center; transition: 0.3s; cursor: pointer;
            height: 400px; display: flex; flex-direction: column; justify-content: space-between;
        }
        .p-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .p-img-box { height: 200px; display: flex; align-items: center; justify-content: center; }
        .p-img-box img { max-height: 100%; max-width: 90%; object-fit: contain; }
        
        .p-card h3 { font-size: 15px; margin: 10px 0; height: 40px; overflow: hidden; }
        .price-box { font-weight: 700; color: var(--primary); font-size: 18px; }
        .add-btn { background: var(--primary); color: white; border: none; width: 100%; padding: 10px; border-radius: 8px; margin-top: 10px; cursor: pointer; }

        .cart-sidebar { position: fixed; top: 0; right: -100%; width: 350px; height: 100%; background: #fff; z-index: 10000; transition: 0.4s; box-shadow: -5px 0 20px rgba(0,0,0,0.1); }
        .cart-sidebar.open { right: 0; }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .section-header h2 { font-size: 22px; }
            .cart-sidebar { width: 100%; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">HAIDER <span>STORE</span></a>
    <nav>
        <ul class="nav-links">
            <li><a href="index.html" class="nav-link">Home</a></li>
            <li class="nav-item">
                <span class="nav-link">Categories <i class="fas fa-chevron-down"></i></span>
                <div class="mega-menu">
                    <div class="menu-col">
                        <h4>Power</h4>
                        <a onclick="setFilter('Data Cables')">Data Cables</a>
                        <a onclick="setFilter('Fast Chargers')">Fast Chargers</a>
                    </div>
                    <div class="menu-col">
                        <h4>Audio</h4>
                        <a onclick="setFilter('Earbuds')">Earbuds</a>
                        <a onclick="setFilter('Handfree')">Handfree</a>
                        <a onclick="setFilter('Headphones')">Headphones</a>
                    </div>
                    <div class="menu-col">
                        <h4>Life Style</h4>
                        <a onclick="setFilter('Smart Watches')">Smart Watches</a>
                    </div>
                </div>
            </li>
            <li><a href="profile.html" class="nav-link">My Profile</a></li>
        </ul>
    </nav>

    <div style="display: flex; gap: 15px; align-items: center; color:white;">
        <i class="fas fa-shopping-bag" onclick="toggleCart()" style="cursor:pointer;"></i>
        <span id="cartBadge" style="background:var(--accent); padding:2px 6px; border-radius:50%; font-size:10px;">0</span>
    </div>
</header>

<main id="mainContent">
    <section style="margin: 20px 5%;"><img id="syncBanner" src="" style="width: 100%; border-radius: 20px; min-height: 200px; object-fit: cover;"></section>

    <div id="earbudsSec">
        <div class="section-header"><h2>Wireless Earbuds</h2></div>
        <div class="slider-container"><div id="earbudsGrid" class="product-slider"></div></div>
    </div>

    <div id="headSec">
        <div class="section-header"><h2>Headphones</h2></div>
        <div class="slider-container"><div id="headphoneGrid" class="product-slider"></div></div>
    </div>

    <div id="chargerSec">
        <div class="section-header"><h2>Chargers & Cables</h2></div>
        <div class="slider-container"><div id="chargerGrid" class="product-slider"></div></div>
    </div>
</main>

<div id="cartSidebar" class="cart-sidebar">
    <div style="padding:20px; background:var(--header-dark); color:white; display:flex; justify-content:space-between;">
        <h3>Your Cart</h3><i class="fas fa-times" onclick="toggleCart()" style="cursor:pointer;"></i>
    </div>
    <div id="cartItemsContainer" style="padding:20px; height:70%; overflow-y:auto;"></div>
    <div style="padding:20px; border-top:1px solid #eee;">
        <h4 id="cartTotal">Total: Rs. 0</h4>
        <button onclick="checkout()" style="width:100%; padding:15px; background:#25d366; color:white; border:none; border-radius:8px; font-weight:700; margin-top:10px;"><i class="fab fa-whatsapp"></i> Order via WhatsApp</button>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCYzkMGDwWZGx_PlrNfjloYZ6PVQRne9wg",
        authDomain: "web-app-4f3a1.firebaseapp.com",
        projectId: "web-app-4f3a1",
        databaseURL: "https://web-app-4f3a1-default-rtdb.firebaseio.com",
        appId: "1:222099203820:web:778e204d2960181dfba7c9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let allProducts = [];
    let cart = JSON.parse(localStorage.getItem('haiderStoreCart')) || [];

    window.toggleCart = () => $('#cartSidebar').toggleClass('open');

    onValue(ref(db, 'settings/heroBanner'), s => { if(s.exists()) document.getElementById('syncBanner').src = s.val(); });
    onValue(ref(db, 'products'), snap => {
        if (snap.exists()) {
            allProducts = Object.keys(snap.val()).map(id => ({ id, ...snap.val()[id] })).reverse();
            renderProducts();
        }
    });

    function renderProducts() {
        renderCategory('Earbuds', '#earbudsGrid');
        renderCategory('Headphones', '#headphoneGrid');
        renderCategory('Chargers', '#chargerGrid', ['Fast Chargers', 'Data Cables']);
        updateCartUI();
    }

    function renderCategory(catName, targetId, multipleCats = null) {
        let filtered = multipleCats ? allProducts.filter(p => multipleCats.includes(p.category)) : allProducts.filter(p => p.category === catName);
        let html = '';

        filtered.forEach(p => {
            html += `
                <div class="p-card">
                    <div onclick="location.href='product.html?id=${p.id}'">
                        <div class="p-img-box"><img src="${p.img}"></div>
                        <h3>${p.name}</h3>
                        <div class="price-box">Rs. ${p.price}</div>
                    </div>
                    <button class="add-btn" onclick="addToCart('${p.id}')">ADD TO CART</button>
                </div>`;
        });

        const $el = $(targetId);
        if ($el.hasClass('slick-initialized')) $el.slick('unslick');
        $el.html(html).slick({
            slidesToShow: 4, slidesToScroll: 1, infinite: false, arrows: true,
            responsive: [{ breakpoint: 1024, settings: { slidesToShow: 2.5 } }, { breakpoint: 768, settings: { slidesToShow: 1.2, arrows: false } }]
        });
    }

    window.addToCart = (id) => {
        const p = allProducts.find(x => x.id === id);
        const exist = cart.find(x => x.id === id);
        if(exist) exist.quantity++; else cart.push({...p, quantity: 1});
        updateCartUI(); toggleCart();
    };

    function updateCartUI() {
        const container = document.getElementById('cartItemsContainer');
        let total = 0, count = 0;
        container.innerHTML = cart.length ? '' : '<p>Cart is empty</p>';
        cart.forEach((item) => {
            total += (item.price * item.quantity); count += item.quantity;
            container.innerHTML += `<div style="display:flex; margin-bottom:10px;"><img src="${item.img}" width="40"> <div style="flex:1; margin-left:10px;">${item.name}<br>Rs. ${item.price}</div></div>`;
        });
        document.getElementById('cartBadge').innerText = count;
        document.getElementById('cartTotal').innerText = `Total: Rs. ${total}`;
        localStorage.setItem('haiderStoreCart', JSON.stringify(cart));
    }

    window.checkout = () => {
        let msg = "🛍️ *New Order*%0A";
        cart.forEach(item => msg += `• ${item.name} (x${item.quantity})%0A`);
        window.open(`https://wa.me/923279518790?text=${msg}`);
    };
</script>

</body>
</html>
