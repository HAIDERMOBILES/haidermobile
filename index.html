<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haider Store | Premium Tech</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfc; scroll-behavior: smooth; top: 0px !important; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .nav-link { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; color: #1e293b; transition: 0.3s; cursor: pointer; }
        .nav-link:hover { color: #f97316; }
        
        @keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
        .skeleton { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 800px 100%; animation: shimmer 1.5s infinite linear; border-radius: 1rem; }
        
        .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px); background: #0f172a; color: white; padding: 1rem 2rem; border-radius: 1rem; z-index: 9999; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; align-items: center; gap: 10px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .toast.show { transform: translateX(-50%) translateY(0); }
        
        #currencySelector, .goog-te-combo { background: #f1f5f9 !important; border: none !important; padding: 5px 10px !important; border-radius: 8px !important; font-size: 11px !important; font-weight: 700 !important; cursor: pointer; outline: none; }
        .goog-te-gadget span { display: none !important; }
    </style>
</head>
<body>

<div id="toast" class="toast"><i class="fas fa-check-circle text-orange-500"></i> <span id="toastMsg">Added to cart!</span></div>

<div id="annBar" class="bg-slate-900 text-white text-[10px] font-bold py-2.5 text-center uppercase tracking-[0.2em] relative z-[6000]">
    Free Delivery on Orders Above Rs. 3000
</div>

<nav class="glass sticky top-0 z-[5000] border-b border-slate-100">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-6">
            <button onclick="toggleMenu()" class="lg:hidden text-slate-900"><i class="fas fa-bars-staggered text-xl"></i></button>
            <a href="index.php" class="text-2xl font-black tracking-tighter text-slate-900 uppercase">
                HAIDER<span class="text-orange-500">STORE.</span>
            </a>
        </div>

        <div class="hidden lg:flex items-center space-x-8">
            <a onclick="setFilter('ALL')" class="nav-link">Home</a>
            <a onclick="setFilter('Earbuds')" class="nav-link">Earbuds</a>
            <a onclick="setFilter('Smart Watches')" class="nav-link">Watches</a>
            <a onclick="setFilter('Fast Chargers')" class="nav-link">Power</a>
        </div>

        <div class="flex items-center gap-4 lg:gap-6">
            <div class="hidden md:flex items-center gap-2">
                <select id="currencySelector" onchange="changeCurrency(this.value)">
                    <option value="PKR">PKR</option>
                    <option value="USD">USD</option>
                    <option value="AED">AED</option>
                </select>
                <div id="google_translate_element"></div>
            </div>
            <button onclick="toggleSearch()" class="text-slate-600 hover:text-orange-500"><i class="fas fa-search text-lg"></i></button>
            <button onclick="toggleCart()" class="relative bg-slate-900 text-white p-2.5 px-5 rounded-full flex items-center gap-2 shadow-xl hover:bg-orange-600 transition-all">
                <i class="fas fa-shopping-bag text-sm"></i>
                <span id="cartBadge" class="text-xs font-bold">0</span>
            </button>
        </div>
    </div>
</nav>

<div id="mobileDrawer" class="fixed inset-y-0 left-0 w-72 bg-white shadow-2xl z-[7000] transform -translate-x-full transition-transform duration-300 p-8">
    <div class="flex justify-between items-center mb-10">
        <span class="font-black text-xl">MENU</span>
        <button onclick="toggleMenu()"><i class="fas fa-times text-xl"></i></button>
    </div>
    <div class="space-y-6">
        <a onclick="setFilter('ALL')" class="block font-bold text-slate-500 hover:text-orange-500">HOME</a>
        <a onclick="setFilter('Earbuds')" class="block font-bold text-slate-500 hover:text-orange-500">EARBUDS</a>
        <a onclick="setFilter('Smart Watches')" class="block font-bold text-slate-500 hover:text-orange-500">SMART WATCHES</a>
        <a onclick="setFilter('Fast Chargers')" class="block font-bold text-slate-500 hover:text-orange-500">CHARGERS</a>
    </div>
</div>

<div id="searchOverlay" class="fixed inset-0 bg-white/95 z-[8000] hidden flex-col items-center justify-center p-6">
    <button onclick="toggleSearch()" class="absolute top-10 right-10 text-3xl"><i class="fas fa-times"></i></button>
    <div class="w-full max-w-2xl">
        <input type="text" id="searchInput" oninput="debounceSearch()" placeholder="Search Products..." class="w-full text-4xl font-black border-b-4 border-slate-900 outline-none pb-4 placeholder:text-slate-200">
    </div>
</div>

<div id="cartSidebar" class="fixed inset-y-0 right-0 w-full md:w-[400px] bg-white shadow-2xl z-[9000] transform translate-x-full transition-transform duration-300 flex flex-col">
    <div class="p-6 border-b flex justify-between items-center bg-slate-900 text-white">
        <h2 class="font-black italic uppercase">Shopping Bag</h2>
        <button onclick="toggleCart()"><i class="fas fa-times text-xl"></i></button>
    </div>
    <div id="cartItemsContainer" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
    <div class="p-6 bg-slate-50 border-t">
        <div class="flex justify-between mb-4">
            <span class="font-bold text-slate-500">Subtotal</span>
            <span id="cartTotal" class="font-black text-xl text-slate-900">Rs. 0</span>
        </div>
        <button onclick="checkout()" class="w-full bg-green-500 text-white py-5 rounded-2xl font-black uppercase tracking-widest flex items-center justify-center gap-3 hover:bg-green-600">
            <i class="fab fa-whatsapp text-xl"></i> Order via WhatsApp
        </button>
    </div>
</div>

<section id="heroSec" class="bg-[#f8f9fb] py-16 px-6 overflow-hidden">
    <div class="max-w-7xl mx-auto flex flex-col lg:flex-row items-center">
        <div class="lg:w-1/2 space-y-8 text-center lg:text-left">
            <h2 class="text-7xl lg:text-9xl font-black leading-[0.8] italic tracking-tighter uppercase text-slate-900">
                Premium<br><span class="text-orange-500">Tech.</span>
            </h2>
            <p class="text-slate-500 font-bold uppercase tracking-widest text-xs">Original Accessories • Fast Shipping</p>
            <button onclick="window.scrollTo(0, 800)" class="bg-slate-900 text-white px-10 py-5 rounded-2xl font-black uppercase text-xs tracking-[0.2em] shadow-2xl hover:bg-orange-500 transition-all">Explore Now</button>
        </div>
        <div class="lg:w-1/2 mt-12 lg:mt-0">
            <img src="https://via.placeholder.com/800x600?text=Loading+Banners..." id="syncBanner" class="w-full h-auto object-contain max-h-[500px] drop-shadow-2xl transition-opacity duration-700">
        </div>
    </div>
</section>

<main class="max-w-7xl mx-auto px-6 py-20">
    <div class="flex flex-col md:flex-row justify-between items-end mb-16 gap-4">
        <div>
            <span class="text-orange-500 font-black text-xs uppercase tracking-[0.3em]">Featured Collection</span>
            <h3 id="gridTitle" class="text-4xl font-black italic uppercase text-slate-900 mt-2">Latest <span class="text-orange-500">Arrivals</span></h3>
        </div>
    </div>

    <div id="skeletonLoader" class="grid grid-cols-2 lg:grid-cols-4 gap-8">
        <div class="skeleton h-80"></div><div class="skeleton h-80"></div>
        <div class="skeleton h-80"></div><div class="skeleton h-80"></div>
    </div>

    <div id="accessoriesGrid" class="grid grid-cols-2 lg:grid-cols-4 gap-4 lg:gap-10"></div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCYzkMGDwWZGx_PlrNfjloYZ6PVQRne9wg",
        authDomain: "web-app-4f3a1.firebaseapp.com",
        projectId: "web-app-4f3a1",
        databaseURL: "https://web-app-4f3a1-default-rtdb.firebaseio.com",
        appId: "1:222099203820:web:778e204d2960181dfba7c9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let allProducts = [];
    let cart = JSON.parse(localStorage.getItem('haiderStoreCart')) || [];
    let currentCurrency = localStorage.getItem('haiderCurrency') || 'PKR';

    const currencyData = {
        PKR: { s: "Rs.", r: 1 }, USD: { s: "$", r: 0.0036 }, AED: { s: "Dh", r: 0.013 }
    };

    window.formatPrice = (val) => {
        const c = currencyData[currentCurrency] || currencyData.PKR;
        return `${c.s} ${(val * c.r).toLocaleString()}`;
    };

    window.toggleMenu = () => document.getElementById('mobileDrawer').classList.toggle('-translate-x-full');
    window.toggleCart = () => document.getElementById('cartSidebar').classList.toggle('translate-x-full');
    window.toggleSearch = () => {
        const s = document.getElementById('searchOverlay');
        s.classList.toggle('hidden');
        if(!s.classList.contains('hidden')) document.getElementById('searchInput').focus();
    };

    window.showToast = (msg) => {
        const t = document.getElementById('toast');
        document.getElementById('toastMsg').innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    };

    // --- Banner Sync (Fixed Path) ---
    onValue(ref(db, 'settings/bannerUrl'), snap => { 
        if(snap.exists()) document.getElementById('syncBanner').src = snap.val(); 
    });

    // --- Products Sync ---
    onValue(ref(db, 'products'), snap => {
        if (snap.exists()) {
            allProducts = Object.keys(snap.val()).map(id => ({ id, ...snap.val()[id] })).reverse();
            document.getElementById('skeletonLoader').style.display = 'none';
            renderProducts(allProducts);
        }
    });

    window.renderProducts = (products) => {
        const grid = document.getElementById('accessoriesGrid');
        grid.innerHTML = products.map(p => `
            <div class="bg-white p-4 lg:p-6 rounded-[2rem] border border-slate-50 shadow-sm hover:shadow-2xl transition-all group relative cursor-pointer" onclick="window.location.href='product.php?id=${p.id}'">
                ${p.oldPrice ? `<span class="absolute top-4 left-4 bg-orange-500 text-white text-[9px] font-black px-3 py-1 rounded-full uppercase z-10">Sale</span>` : ''}
                <div class="aspect-square bg-slate-50 rounded-[1.5rem] p-4 mb-6 overflow-hidden flex items-center justify-center">
                    <img src="${p.img}" class="max-h-full group-hover:scale-110 transition-transform duration-500">
                </div>
                <p class="text-[9px] font-black text-orange-500 uppercase tracking-widest mb-1">${p.category}</p>
                <h4 class="font-bold text-slate-900 text-sm truncate mb-4">${p.name}</h4>
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-[10px] text-slate-400 line-through font-bold">${p.oldPrice ? formatPrice(p.oldPrice) : ''}</p>
                        <p class="font-black text-slate-900">${formatPrice(p.price)}</p>
                    </div>
                    <button onclick="event.stopPropagation(); addToCart('${p.id}', '${p.name.replace(/'/g, "")}', ${p.price}, '${p.img}')" class="bg-slate-900 text-white w-10 h-10 rounded-full hover:bg-orange-500 transition-colors">
                        <i class="fas fa-plus text-xs"></i>
                    </button>
                </div>
            </div>
        `).join('');
    };

    window.setFilter = (cat) => {
        document.getElementById('gridTitle').innerHTML = cat === 'ALL' ? `Latest <span class="text-orange-500">Arrivals</span>` : cat;
        const filtered = cat === 'ALL' ? allProducts : allProducts.filter(p => p.category === cat);
        renderProducts(filtered);
        document.getElementById('mobileDrawer').classList.add('-translate-x-full');
    };

    window.debounceSearch = () => {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allProducts.filter(p => p.name.toLowerCase().includes(term));
        renderProducts(filtered);
    };

    window.addToCart = (id, name, price, img) => {
        const idx = cart.findIndex(i => i.id === id);
        if(idx > -1) cart[idx].qty++;
        else cart.push({id, name, price, img, qty: 1});
        saveCart();
        showToast("Added to Bag!");
    };

    function saveCart() {
        localStorage.setItem('haiderStoreCart', JSON.stringify(cart));
        updateCartUI();
    }

    window.updateCartUI = () => {
        const container = document.getElementById('cartItemsContainer');
        const badge = document.getElementById('cartBadge');
        const totalEl = document.getElementById('cartTotal');
        badge.innerText = cart.reduce((a, b) => a + b.qty, 0);
        
        if(cart.length === 0) {
            container.innerHTML = `<div class="text-center py-20 text-slate-300 font-bold uppercase text-xs">Bag is Empty</div>`;
            totalEl.innerText = formatPrice(0);
            return;
        }

        let total = 0;
        container.innerHTML = cart.map((item, i) => {
            total += (item.price * item.qty);
            return `
                <div class="flex gap-4 bg-slate-50 p-4 rounded-2xl">
                    <img src="${item.img}" class="w-16 h-16 object-contain bg-white rounded-lg p-1">
                    <div class="flex-1">
                        <h5 class="text-xs font-black truncate w-40">${item.name}</h5>
                        <p class="text-xs font-bold text-orange-500 mt-1">${formatPrice(item.price)}</p>
                        <div class="flex items-center gap-3 mt-2">
                            <button onclick="updateQty(${i}, -1)" class="w-6 h-6 bg-white rounded border text-xs">-</button>
                            <span class="text-xs font-black">${item.qty}</span>
                            <button onclick="updateQty(${i}, 1)" class="w-6 h-6 bg-white rounded border text-xs">+</button>
                        </div>
                    </div>
                </div>`;
        }).join('');
        totalEl.innerText = formatPrice(total);
    };

    window.updateQty = (i, c) => {
        cart[i].qty += c;
        if(cart[i].qty <= 0) cart.splice(i, 1);
        saveCart();
    };

    window.changeCurrency = (c) => {
        currentCurrency = c;
        localStorage.setItem('haiderCurrency', c);
        renderProducts(allProducts);
        updateCartUI();
    };

    window.checkout = () => {
        if(cart.length === 0) return;
        let msg = `*New Order - Haider Store*%0A%0A`;
        cart.forEach(i => msg += `• ${i.name} (x${i.qty})%0A`);
        const total = cart.reduce((a, b) => a + (b.price * b.qty), 0);
        msg += `%0A*Total: ${formatPrice(total)}*`;
        window.open(`https://wa.me/923279518790?text=${msg}`);
    };

    updateCartUI();
</script>

<script type="text/javascript">
    function googleTranslateElementInit() {
        new google.translate.TranslateElement({pageLanguage: 'en', includedLanguages: 'ur,ar,hi', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
    }
</script>
<script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
